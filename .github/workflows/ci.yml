name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@backstory.dev"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: make build

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...
