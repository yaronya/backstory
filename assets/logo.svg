<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3CE1"/>
      <stop offset="100%" stop-color="#E94560"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0eaff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Back page (offset, representing history/backstory) -->
  <rect x="152" y="108" width="230" height="296" rx="16" fill="white" opacity="0.25" transform="rotate(-4 267 256)"/>

  <!-- Middle page -->
  <rect x="148" y="112" width="230" height="296" rx="16" fill="white" opacity="0.45" transform="rotate(-1.5 263 260)"/>

  <!-- Front page (the current decision) -->
  <rect x="144" y="116" width="230" height="296" rx="16" fill="url(#page)"/>

  <!-- Text lines on front page representing a decision -->
  <rect x="176" y="156" width="120" height="10" rx="5" fill="#6C3CE1" opacity="0.8"/>
  <rect x="176" y="184" width="166" height="6" rx="3" fill="#2b2d42" opacity="0.3"/>
  <rect x="176" y="200" width="150" height="6" rx="3" fill="#2b2d42" opacity="0.3"/>
  <rect x="176" y="216" width="158" height="6" rx="3" fill="#2b2d42" opacity="0.3"/>

  <!-- Divider line -->
  <rect x="176" y="240" width="166" height="1.5" rx="0.75" fill="#6C3CE1" opacity="0.15"/>

  <!-- "Why" section - highlighted to represent the reasoning -->
  <rect x="176" y="258" width="60" height="8" rx="4" fill="#E94560" opacity="0.7"/>
  <rect x="176" y="276" width="166" height="6" rx="3" fill="#2b2d42" opacity="0.2"/>
  <rect x="176" y="292" width="140" height="6" rx="3" fill="#2b2d42" opacity="0.2"/>
  <rect x="176" y="308" width="155" height="6" rx="3" fill="#2b2d42" opacity="0.2"/>

  <!-- Connection dots - representing shared/connected knowledge -->
  <circle cx="340" cy="360" r="6" fill="#E94560" opacity="0.6"/>
  <circle cx="356" cy="346" r="4" fill="#6C3CE1" opacity="0.5"/>
  <circle cx="358" cy="368" r="3" fill="#E94560" opacity="0.4"/>

  <!-- Subtle arrow/flow indicator on the right side -->
  <path d="M 390 220 Q 410 256 390 292" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 386 286 L 390 292 L 396 288" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
</svg>
